<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#33143a"/>
      <stop offset="1" stop-color="#3d1a0c"/>
    </linearGradient>
    <radialGradient id="puri" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#f2c56b"/>
      <stop offset="0.7" stop-color="#d99a3f"/>
      <stop offset="1" stop-color="#a86a24"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#ffb054" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffb054" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <circle cx="64" cy="62" r="48" fill="url(#glow)"/>
  <!-- puri -->
  <circle cx="64" cy="62" r="34" fill="url(#puri)"/>
  <!-- crack opening with pani -->
  <ellipse cx="64" cy="52" rx="16" ry="10" fill="#5b3a14"/>
  <ellipse cx="64" cy="52" rx="12" ry="7" fill="#3f7d4e"/>
