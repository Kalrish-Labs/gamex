  <ellipse cx="48" cy="44" rx="9" ry="5" fill="#ffe9b8" opacity="0.55" transform="rotate(-25 48 44)"/>
  <!-- chili accent -->
  <path d="M 96 92 q 10 -2 12 -12 q 3 8 -3 16 q -5 7 -13 5 q -3 -1 -2 -4 q 1 -4 6 -5 z" fill="#d8341c"/>
  <circle cx="106" cy="79" r="3" fill="#3f7d4e"/>
